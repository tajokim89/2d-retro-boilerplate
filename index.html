<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>retro-napolitan</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0b0f;
        --fg: #e8e4d8;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      /*
       * 캔버스 자체는 PIXI 가 디바이스 픽셀에 맞춰 1:1 로 렌더링한다.
       * world 컨테이너(픽셀 아트)는 PIXI 안에서 정수배 스케일되어 nearest-neighbor.
       * ui 컨테이너(텍스트)는 1:1 → 글자 크리스피.
       * CSS image-rendering 은 따로 강제하지 않는다 (강제하면 안티앨리어싱된 텍스트가 깨짐).
       */
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
