<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>retro-napolitan</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0b0f;
        --fg: #d8d2c2;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #app canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
